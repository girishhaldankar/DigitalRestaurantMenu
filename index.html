<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Restaurant Dashboard</title>

  <!-- 🔥 Dynamic PWA Manifest -->
  <link id="manifest-link" rel="manifest" href="/manifest-menu.json" />

  <meta name="theme-color" content="#4CAF50" />
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <!-- 🔥 Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/service-worker.js')
          .then(reg => console.log('✅ Service Worker registered:', reg))
          .catch(err => console.error('❌ Service Worker failed:', err));
      });
    }
  </script>

  <!-- 🔥 Dynamic Manifest Switch -->
  <script>
    const manifestLink = document.getElementById("manifest-link");

    if (window.location.pathname.startsWith("/admin")) {
      manifestLink.setAttribute("href", "/manifest-admin.json");
      console.log("📱 Admin Manifest Loaded");
    } else {
      manifestLink.setAttribute("href", "/manifest-menu.json");
      console.log("📱 Menu Manifest Loaded");
    }
  </script>

</body>
</html>
